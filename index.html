<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Build Your Resume</h1>

  <form name="resumeForm" id="resumeForm">
    <label>Full Name</label>
    <input type="text" id="fullName" required />

    <label>Address</label>
    <input type="text" id="fullAddress" />

    <label>Phone</label>
    <input type="tel" id="telePhone" />

    <label>Email</label>
    <input type="email" id="email" />

    <label>Website / Portfolio</label>
    <input type="text" id="website" />

    <label>Professional Summary</label>
    <textarea id="personalInfo" rows="3"></textarea>

    <label>Skills</label>
    <textarea id="careerSkills" rows="3"></textarea>

    <label>Education</label>
    <textarea id="educationDeets" rows="3"></textarea>

    <label>Employment Start Date</label>
    <input type="date" id="startDate" />

    <label>Employment End Date</label>
    <input type="date" id="endDate" />

    <label>Work Experience</label>
    <textarea id="employment" rows="4"></textarea>

    <input type="button" value="Create Resume" onclick="createResume()" />
  </form>

  <script src="script.js"></script>
</body>
</html>
